<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>手机排班工具</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f7f8fb;
      --panel: #fff;
      --line: #d8dee8;
      --text: #172033;
      --muted: #667085;
      --brand: #2563eb;
      --brand-soft: #eaf1ff;
      --bad: #b42318;
      --bad-soft: #fff1f0;
      --warn: #92400e;
      --warn-soft: #fff7ed;
      --good: #067647;
      --good-soft: #ecfdf3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", system-ui, sans-serif;
      font-size: 14px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
    }

    h1 {
      margin: 0;
      font-size: 17px;
    }

    .sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    main {
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 8px 10px 0;
    }

    .step-tab {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 4px;
      font-size: 12px;
    }

    .step-tab.active {
      border-color: var(--brand);
      background: var(--brand-soft);
      color: var(--brand);
      font-weight: 700;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .panel[hidden] {
      display: none;
    }

    .panel-head {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }

    .panel-body {
      padding: 10px;
      display: grid;
      gap: 9px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      display: block;
      margin-bottom: 4px;
    }

    input, select, textarea, button {
      font: inherit;
    }

    input[type="file"], select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: #fff;
    }

    textarea {
      min-height: 76px;
      resize: vertical;
    }

    #templateText {
      min-height: 152px;
      line-height: 1.5;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 6px;
      padding: 7px 9px;
      color: var(--text);
    }

    .primary {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    .ghost {
      border-color: transparent;
      background: transparent;
      color: var(--muted);
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .import-diagnosis {
      border: 1px solid #dbe4f0;
      background: #f8fbff;
      border-radius: 8px;
      padding: 8px 9px;
      display: grid;
      gap: 6px;
    }

    .import-diagnosis-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .import-diagnosis-title {
      font-size: 12px;
      font-weight: 700;
    }

    .import-diagnosis-badge {
      border: 1px solid #d5dbe6;
      background: #fff;
      color: var(--muted);
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 11px;
      white-space: nowrap;
    }

    .import-diagnosis-badge.warn {
      color: var(--warn);
      border-color: #fed7aa;
      background: #fff7ed;
    }

    .import-diagnosis-badge.good {
      color: var(--good);
      border-color: #abefc6;
      background: #ecfdf3;
    }

    .import-diagnosis-badge.bad {
      color: var(--bad);
      border-color: #fecaca;
      background: #fff1f0;
    }

    .import-diagnosis-message {
      font-size: 12px;
      line-height: 1.5;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .import-diagnosis-details {
      display: grid;
      gap: 7px;
    }

    .import-diagnosis-extra {
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
    }

    .import-diagnosis-list {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .import-summary {
      display: grid;
      gap: 4px;
      padding: 7px 8px;
      border: 1px dashed #d5dbe6;
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.75);
    }

    .import-summary-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }

    .import-summary-line {
      font-size: 12px;
      line-height: 1.45;
      color: var(--text);
    }

    .import-summary-preview {
      color: var(--muted);
    }

    .import-diagnosis-toggle {
      justify-self: start;
      padding: 5px 8px;
      font-size: 12px;
    }

    .import-preview {
      display: grid;
      gap: 4px;
      padding: 7px 8px;
      border: 1px solid #dbe4f0;
      border-radius: 7px;
      background: #fff;
    }

    .import-preview-line {
      font-size: 12px;
      line-height: 1.4;
      color: var(--text);
      word-break: break-word;
    }

    .chips {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      max-height: 260px;
      overflow: auto;
    }

    .chip-row {
      position: relative;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      padding: 6px;
      min-width: 0;
      text-align: left;
    }

    .chip-main {
      width: 100%;
      cursor: default;
      padding-right: 20px;
    }

    .chip.selected {
      border-color: var(--brand);
      background: var(--brand-soft);
    }

    .chip.assigned {
      opacity: 0.55;
    }

    .chip-remove {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 16px;
      min-width: 16px;
      height: 16px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: #b42318;
      font-size: 11px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chip-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .assigned-mark {
      color: #f4b400;
      font-size: 14px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .name {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .shift {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .slots {
      display: grid;
      gap: 7px;
    }

    .slot-group {
      display: grid;
      gap: 7px;
    }

    .slot-group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 2px 2px 0;
    }

    .slot-group-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }

    .slot-group-list {
      display: grid;
      gap: 7px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .template-actions {
      display: flex;
      justify-content: flex-end;
      gap: 7px;
      flex-wrap: wrap;
    }

    .previous-day-report {
      display: grid;
      gap: 5px;
    }

    .undo-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border: 1px solid #f2d675;
      background: #fff8d9;
      border-radius: 8px;
      padding: 8px 10px;
    }

    .undo-bar[hidden] {
      display: none;
    }

    .slot {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfcfe;
      overflow: hidden;
    }

    .slot-head {
      padding: 6px 7px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      align-items: center;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    .slot-title {
      font-weight: 700;
      font-size: 13px;
    }

    .slot-body {
      padding: 7px;
      display: grid;
      gap: 6px;
    }

    .assigned-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      min-height: 24px;
    }

    .assigned-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 12px;
    }

    .assigned-pill button {
      border: 0;
      padding: 0;
      background: transparent;
      color: var(--muted);
      line-height: 1;
    }

    .slot-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
    }

    .slot-search {
      display: grid;
      gap: 5px;
    }

    .slot-search-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 8px;
      background: #fff;
      font-size: 12px;
    }

    .slot-search-results {
      display: grid;
      gap: 5px;
    }

    .slot-search-result {
      width: 100%;
      border: 1px solid #dbe4f0;
      background: #fff;
      border-radius: 6px;
      padding: 6px 8px;
      text-align: left;
      font-size: 12px;
      line-height: 1.35;
    }

    .slot-search-empty {
      color: var(--muted);
      font-size: 12px;
      padding: 4px 2px;
    }

    .status {
      border: 1px solid;
      border-radius: 7px;
      padding: 7px;
      font-size: 12px;
      line-height: 1.45;
    }

    .status.good { color: var(--good); background: var(--good-soft); border-color: #abefc6; }
    .status.warn { color: var(--warn); background: var(--warn-soft); border-color: #fed7aa; }
    .status.bad { color: var(--bad); background: var(--bad-soft); border-color: #fecaca; }

    .output {
      min-height: 220px;
      white-space: pre-wrap;
      line-height: 1.55;
    }

    .sticky-actions {
      position: sticky;
      bottom: 0;
      background: rgba(247, 248, 251, 0.96);
      padding: 8px 10px 10px;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .secondary-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 10px 10px;
    }

    .secondary-actions.single {
      grid-template-columns: 1fr;
    }

    @media (max-width: 420px) {
      body {
        font-size: 13px;
      }

      header {
        padding: 8px 10px;
      }

      h1 {
        font-size: 16px;
      }

      .sub {
        margin-top: 2px;
        font-size: 11px;
        line-height: 1.4;
      }

      .steps {
        padding: 6px 8px 0;
        gap: 5px;
      }

      .step-tab {
        padding: 6px 2px;
        font-size: 11px;
      }

      main {
        padding: 8px;
        gap: 8px;
      }

      .panel-head {
        padding: 8px 9px;
      }

      .panel-body {
        padding: 9px;
        gap: 8px;
      }

      input[type="file"], select, textarea {
        padding: 7px;
      }

      button {
        padding: 7px 8px;
      }

      .import-diagnosis {
        padding: 7px 8px;
      }

      .import-diagnosis-title,
      .import-diagnosis-message,
      .import-diagnosis-extra,
      .import-diagnosis-list,
      .import-summary-title,
      .import-summary-line,
      .import-preview-line {
        font-size: 11px;
      }

      .chips {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        max-height: 240px;
      }

      .chip {
        padding: 5px;
      }

      .slot-group-head {
        padding: 0;
      }

      .slot-title {
        font-size: 12px;
      }

      .slot-head {
        padding: 6px;
      }

      .slot-body {
        padding: 6px;
        gap: 5px;
      }

      .assigned-pill {
        padding: 3px 6px;
        font-size: 11px;
      }

      .slot-actions {
        grid-template-columns: 1fr;
        gap: 5px;
      }

      .slot-actions button {
        width: 100%;
      }

      .status {
        padding: 6px;
        font-size: 11px;
      }

      .output {
        min-height: 180px;
      }

      .secondary-actions {
        padding: 0 8px 8px;
      }

      .sticky-actions {
        padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
      }
    }

    @media (max-width: 360px) {
      .step-tab {
        font-size: 10px;
      }

      .chips {
        max-height: 220px;
      }

      .assigned-mark {
        font-size: 13px;
      }
    }

    @media (min-width: 760px) {
      main {
        grid-template-columns: 1fr;
        align-items: start;
      }
      .chips {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>手机排班工具</h1>
    <div class="sub">不用拖拽：在每个岗位下拉选择人员，再点“选入”。</div>
  </header>

  <nav class="steps" aria-label="排班步骤">
    <button class="step-tab active" type="button" data-step-tab="0">1 人员</button>
    <button class="step-tab" type="button" data-step-tab="1">2 模板</button>
    <button class="step-tab" type="button" data-step-tab="2">3 导出</button>
  </nav>

  <main>
    <section class="panel" data-step-panel="0">
      <div class="panel-head">
        <span>人员</span>
        <span class="hint" id="peopleCount">0人</span>
      </div>
      <div class="panel-body">
        <div>
          <label for="fileInput">导入 Excel</label>
          <input id="fileInput" type="file" accept=".xlsx,.xls,.csv" />
          <div class="hint" id="fileStatus">未记忆排班表。</div>
          <div class="import-diagnosis" id="importDiagnosis"></div>
        </div>
        <div>
          <label for="dateSelect">排班日期</label>
          <select id="dateSelect"></select>
        </div>
        <div>
          <label for="outsidePeople">排班表外人员</label>
          <textarea id="outsidePeople" placeholder="每行一个人，只记忆在这里；点刷新后加入人员池。"></textarea>
          <button id="refreshOutside" class="primary" type="button">刷新表外人员</button>
        </div>
        <div class="chips" id="peopleList"></div>
        <div class="undo-bar" id="undoBar" hidden>
          <span class="hint" id="undoText"></span>
          <button id="undoRemove" type="button">撤回</button>
        </div>
      </div>
    </section>

    <section class="panel" data-step-panel="1" hidden>
      <div class="panel-head">
        <span>模板</span>
        <button id="applyTemplate" type="button">应用</button>
      </div>
      <div class="panel-body">
        <textarea id="templateText">1号间
2号间
5号间
6号间
7号间
10号间
11号间
恢复室
胃镜室
青龙山
总务
机动
2+5
6+7
10+11
恢复室
夜班
备班
备山
二备
总值班
二线班</textarea>
        <div class="template-actions">
          <button id="fillFromPreviousDay" type="button">参考前一天填入常规岗位</button>
          <button id="clearTemplateAssignments" type="button">清空</button>
        </div>
        <div id="peopleReminder"></div>
        <div class="previous-day-report" id="previousDayReport"></div>
        <div class="slots" id="slots"></div>
      </div>
    </section>

    <section class="panel" data-step-panel="2" hidden>
      <div class="panel-head">
        <span>导出</span>
        <button id="copyText" class="primary" type="button">复制微信版</button>
      </div>
      <div class="panel-body">
        <div id="statusList"></div>
        <div>
          <label for="notesText">备注</label>
          <textarea id="notesText" placeholder="这里的备注会一起带进微信发送内容"></textarea>
        </div>
        <textarea id="outputText" class="output" readonly></textarea>
      </div>
    </section>
  </main>

  <div class="secondary-actions">
    <button id="prevStep" type="button">返回</button>
    <button id="nextStep" class="primary" type="button">下一步</button>
  </div>

  <div class="sticky-actions">
    <button id="clearAssignments" type="button">清空排班</button>
    <button id="clearAll" class="ghost" type="button">清空人员</button>
  </div>

  <script>
    const state = {
      matrixRows: [],
      dateColumns: [],
      selectedDateLabel: "",
      specialDuty: {},
      basePeople: [],
      outsidePeople: [],
      people: [],
      slots: [],
      importDiagnosis: null,
      previousDayFillReport: null,
      activeDateColumn: "",
      selectedPersonId: "",
      hiddenPeopleKeys: [],
      lastRemovedPerson: null
    };

    const els = {
      fileInput: document.querySelector("#fileInput"),
      fileStatus: document.querySelector("#fileStatus"),
      importDiagnosis: document.querySelector("#importDiagnosis"),
      dateSelect: document.querySelector("#dateSelect"),
      outsidePeople: document.querySelector("#outsidePeople"),
      refreshOutside: document.querySelector("#refreshOutside"),
      peopleReminder: document.querySelector("#peopleReminder"),
      peopleList: document.querySelector("#peopleList"),
      peopleCount: document.querySelector("#peopleCount"),
      undoBar: document.querySelector("#undoBar"),
      undoText: document.querySelector("#undoText"),
      undoRemove: document.querySelector("#undoRemove"),
      templateText: document.querySelector("#templateText"),
      applyTemplate: document.querySelector("#applyTemplate"),
      clearTemplateAssignments: document.querySelector("#clearTemplateAssignments"),
      fillFromPreviousDay: document.querySelector("#fillFromPreviousDay"),
      previousDayReport: document.querySelector("#previousDayReport"),
      slots: document.querySelector("#slots"),
      statusList: document.querySelector("#statusList"),
      notesText: document.querySelector("#notesText"),
      outputText: document.querySelector("#outputText"),
      copyText: document.querySelector("#copyText"),
      prevStep: document.querySelector("#prevStep"),
      nextStep: document.querySelector("#nextStep"),
      clearAssignments: document.querySelector("#clearAssignments"),
      clearAll: document.querySelector("#clearAll")
    };

    let currentStep = 0;
    state.importDiagnosis = createEmptyImportDiagnosis();

    const keys = {
      scheduleMatrix: "mobileScheduler.scheduleMatrix.v1",
      scheduleMatrixVersion: "mobileScheduler.scheduleMatrixVersion.v2",
      scheduleFileName: "mobileScheduler.scheduleFileName.v1",
      selectedDateColumn: "mobileScheduler.selectedDateColumn.v1",
      outsideText: "mobileScheduler.outsideText.v1",
      templateText: "mobileScheduler.templateText.v1",
      slotAssignmentsByDate: "mobileScheduler.slotAssignmentsByDate.v1",
      notesText: "mobileScheduler.notesText.v1"
    };

    const DEFAULT_TEMPLATE_TEXT = [
      "1号间", "2号间", "5号间", "6号间", "7号间", "10号间", "11号间",
      "恢复室", "胃镜室", "青龙山", "总务", "机动",
      "2+5", "6+7", "10+11", "恢复室",
      "夜班", "备班", "备山", "二备", "总值班", "二线班"
    ].join("\n");

    const LEGACY_TEMPLATE_TEXTS = new Set([
      [
        "2号间", "5号间", "6号间", "7号间", "10号间", "11号间",
        "恢复室", "胃镜室", "青龙山", "总务",
        "2+5", "6+7", "10+11", "恢复室补位",
        "夜班", "备班", "备山", "二备"
      ].join("\n"),
      [
        "1号间", "2号间", "5号间", "6号间", "7号间", "10号间", "11号间",
        "恢复室", "胃镜室", "青龙山", "总务",
        "2+5", "6+7", "10+11", "恢复室补位",
        "夜班", "备班", "备山", "二备"
      ].join("\n"),
      [
        "1号间", "2号间", "5号间", "6号间", "7号间", "10号间", "11号间",
        "恢复室", "胃镜室", "青龙山", "总务", "机动",
        "2+5", "6+7", "10+11", "恢复室",
        "夜班", "备班", "备山", "二备", "总值班/二线班"
      ].join("\n")
    ]);

    const IGNORED_SELECTED_SLOT_TITLES = new Set([
      "夜班", "备班", "备办", "备山", "二备", "总值班", "二线班", "总值班/二线班"
    ]);

    const FIXED_TEMPLATE_SLOT_TITLES = new Set([
      "夜班", "备班", "备办", "备山", "二备", "总值班", "二线班", "总值班/二线班"
    ]);

    const AUTO_ASSIGN_SLOT_TITLES = new Set([
      "夜班", "备班", "备山", "二备", "二线班", "胃镜室", "青龙山", "总务", "机动"
    ]);

    function id(prefix) {
      return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;

    function createEmptyImportSummary() {
      return {
        rowCount: 0,
        dateRowIndex: null,
        dateCount: 0,
        selectedDateLabel: "",
        basePeopleCount: 0,
        previewRows: []
      };
    }

    function createEmptyImportDiagnosis() {
      return {
        status: "idle",
        fileName: "",
        summary: createEmptyImportSummary(),
        errorMessage: "",
        previewExpanded: false
      };
    }

    function updateImportDiagnosis(patch = {}) {
      state.importDiagnosis = {
        ...createEmptyImportDiagnosis(),
        ...(state.importDiagnosis || {}),
        ...patch,
        summary: patch.summary !== undefined ? patch.summary : (state.importDiagnosis?.summary || createEmptyImportSummary())
      };
    }

    function updateImportSummary(partial = {}) {
      updateImportDiagnosis({
        summary: {
          ...createEmptyImportSummary(),
          ...(state.importDiagnosis?.summary || {}),
          ...partial
        }
      });
    }

    function renderImportDiagnosis() {
      const diagnosis = state.importDiagnosis || createEmptyImportDiagnosis();
      const summary = diagnosis.summary || createEmptyImportSummary();
      const hasSummary = summary.rowCount || summary.dateCount || summary.basePeopleCount || summary.previewRows.length;
      const previewRows = summary.previewRows || [];
      const previewLines = previewRows.slice(0, 10);
      const summaryPreview = previewRows.slice(0, 5);
      const badgeMap = {
        idle: { label: "导入建议", className: "warn" },
        memory: { label: "本机记忆", className: "warn" },
        parsing: { label: "正在读取", className: "warn" },
        success: { label: "识别成功", className: "good" },
        no_dates: { label: "需要检查", className: "bad" },
        no_people: { label: "需要确认", className: "bad" },
        error: { label: "导入失败", className: "bad" }
      };
      const badge = badgeMap[diagnosis.status] || badgeMap.idle;

      let message = DEFAULT_IMPORT_DIAGNOSIS_MESSAGE;
      if (diagnosis.status === "memory") {
        message = "当前使用的是本机记忆的排班表。如今天班次不对，请点击底部“清空人员”后重新导入最新 Excel。";
      } else if (diagnosis.status === "parsing") {
        message = `正在读取 ${diagnosis.fileName || "Excel"}，请稍等一下。`;
      } else if (diagnosis.status === "success") {
        message = "已读取到当前排班表。下面这份识别摘要可以帮你快速判断日期、人数和班次是不是对的。";
      } else if (diagnosis.status === "no_dates") {
        message = "未识别到横向日期行。请检查 Excel 中是否有一行包含多个 1–31 的日期数字；如果安卓手机异常，请换 Chrome，并清空人员后重新导入。";
      } else if (diagnosis.status === "no_people") {
        message = "已识别日期，但该日期列没有读取到人员。请检查姓名是否在第一列，或当前日期列是否正确。";
      } else if (diagnosis.status === "error") {
        message = "这次导入没有成功。先别着急，按下面几条顺着排查，通常很快就能定位到是浏览器、缓存，还是文件本身的问题。";
      }

      const errorDetail = diagnosis.status === "error" && diagnosis.errorMessage
        ? `<div class="import-diagnosis-extra">原始错误：${escapeHtml(diagnosis.errorMessage)}</div>`
        : "";

      const suggestionList = diagnosis.status === "error"
        ? `
          <ul class="import-diagnosis-list">
            ${IMPORT_ERROR_SUGGESTIONS.map(item => `<li>${escapeHtml(item)}</li>`).join("")}
          </ul>
        `
        : "";

      const summaryHtml = hasSummary
        ? `
          <div class="import-summary">
            <div class="import-summary-title">识别摘要</div>
            <div class="import-summary-line">总行数：${summary.rowCount || 0}</div>
            <div class="import-summary-line">日期行位置：${summary.dateRowIndex === null ? "未识别" : `第${summary.dateRowIndex + 1}行`}</div>
            <div class="import-summary-line">识别到的日期数量：${summary.dateCount || 0}</div>
            <div class="import-summary-line">当前选择日期：${escapeHtml(summary.selectedDateLabel || "未选择")}</div>
            <div class="import-summary-line">读取到的人员数量：${summary.basePeopleCount || 0}</div>
            ${summaryPreview.length ? `<div class="import-summary-preview">前5人预览：${escapeHtml(summaryPreview.map(item => `${item.name}：${item.shift}`).join("；"))}</div>` : ""}
          </div>
        `
        : "";

      const previewHtml = previewLines.length
        ? `
          <div class="import-preview">
            ${previewLines.map(item => `<div class="import-preview-line">${escapeHtml(`${item.name}：${item.shift}`)}</div>`).join("")}
          </div>
        `
        : "";

      const hasDetails = diagnosis.status === "error" || hasSummary || previewLines.length;
      const toggleHtml = hasDetails
        ? `<button type="button" class="import-diagnosis-toggle" id="toggleImportPreview">${diagnosis.previewExpanded ? "收起导入详情" : "查看导入详情"}</button>`
        : "";

      const detailHtml = diagnosis.previewExpanded
        ? `
          <div class="import-diagnosis-details">

      els.importDiagnosis.innerHTML = `

    function personKey(person) {
      return `${norm(person?.name)}__${norm(person?.shift)}`;
    }

    function isHiddenPerson(person) {
      return state.hiddenPeopleKeys.includes(personKey(person));
    }

    function norm(value) {
      return String(value ?? "").trim();
    }

    function parsePeopleText(text) {
      return text.split(/\r?\n/)
        .map(norm)
        .filter(Boolean)
        .map(line => {
          const parts = line.split(/\s+/);
          return { id: id("p"), name: parts.shift() || "", shift: parts.join(" "), outside: true };
        })
        .filter(person => person.name);
    }

    function matrixFromSheet(sheet) {
      const matrixRows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
      for (const merge of sheet["!merges"] || []) {
        const topLeft = matrixRows[merge.s.r]?.[merge.s.c] ?? "";
        for (let r = merge.s.r; r <= merge.e.r; r += 1) {
          if (!matrixRows[r]) matrixRows[r] = [];
          for (let c = merge.s.c; c <= merge.e.c; c += 1) {
            matrixRows[r][c] = topLeft;
          }
        }
      }
      return matrixRows;
    }

    function setupSchedule(matrixRows, preferredCol = "") {
      state.matrixRows = matrixRows;
      state.dateColumns = [];
      const dateRowIndex = matrixRows.findIndex(row => row.filter(value => Number.isInteger(Number(value)) && Number(value) >= 1 && Number(value) <= 31).length >= 5);
      updateImportSummary({
        rowCount: matrixRows.length,
        dateRowIndex: dateRowIndex >= 0 ? dateRowIndex : null,
        dateCount: 0,
        selectedDateLabel: "",
        basePeopleCount: 0,
        previewRows: []
      });
      if (dateRowIndex < 0) return false;
      const dateRow = matrixRows[dateRowIndex];
      const monthText = norm(dateRow[0]) || "本月";
      state.dateColumns = dateRow.map((value, colIndex) => ({ value, colIndex }))
        .filter(item => item.colIndex > 0 && Number.isInteger(Number(item.value)) && Number(item.value) >= 1 && Number(item.value) <= 31)
        .map(item => ({ colIndex: item.colIndex, day: Number(item.value), label: `${monthText}${Number(item.value)}日`, dateRowIndex }));
      updateImportSummary({
        dateRowIndex,
        dateCount: state.dateColumns.length
      });
      els.dateSelect.innerHTML = state.dateColumns.map(item => `<option value="${item.colIndex}">${escapeHtml(item.label)}</option>`).join("");
      const preferred = state.dateColumns.find(item => String(item.colIndex) === String(preferredCol));
      const today = state.dateColumns.find(item => item.day === new Date().getDate());
      if (preferred) els.dateSelect.value = preferred.colIndex;
      else if (today) els.dateSelect.value = today.colIndex;
      rebuildPeopleFromDate();
      return true;
    }

    function rebuildPeopleFromDate() {
      state.previousDayFillReport = null;
      state.basePeople = [];
      state.specialDuty = {};
      const selectedCol = Number(els.dateSelect.value || state.dateColumns[0]?.colIndex || 0);
      const selectedDate = state.dateColumns.find(item => item.colIndex === selectedCol);
      if (!selectedDate) {
        state.selectedDateLabel = "";
        state.activeDateColumn = "";
        updateImportSummary({
          selectedDateLabel: "",
          basePeopleCount: 0,
          previewRows: []
        });
        combinePeople();
        render();
        return;
      }
      state.selectedDateLabel = selectedDate.label;
      state.activeDateColumn = String(selectedDate.colIndex);
      const previewRows = [];
      const startRow = selectedDate.dateRowIndex + 2;
      for (let r = startRow; r < state.matrixRows.length; r++) {
        const row = state.matrixRows[r] || [];
        const name = norm(row[0]);
        const shift = norm(row[selectedCol]);
        if (!name) continue;
        if (["总值班", "二线班"].includes(name)) {
          state.specialDuty[name] = shift;
          continue;
        }
        state.basePeople.push({ id: id("p"), name, shift, source: "base" });
        if (previewRows.length < 10) previewRows.push({ name, shift: shift || "空白" });
      }
      updateImportSummary({
        selectedDateLabel: state.selectedDateLabel,
        basePeopleCount: state.basePeople.length,
        previewRows
      });
      updateImportDiagnosis({
        status: state.basePeople.length ? "success" : "no_people"
      });
      combinePeople();
      removeMissingAssignments();
      autoAssign();
      restoreSavedSlotAssignmentsForDate();
      render();
    }

    function combinePeople() {
      const seen = new Set();
      state.people = [];
      for (const person of [...state.basePeople, ...state.outsidePeople]) {
        const key = `${person.name}__${person.shift}`;
        if (seen.has(key) || isHiddenPerson(person)) continue;
        state.people.push({ ...person, id: id("p"), source: person.source || "base" });
        seen.add(key);
      }
    }

    function resetImportedScheduleState() {
      state.matrixRows = [];
      state.dateColumns = [];
      state.selectedDateLabel = "";
      state.activeDateColumn = "";
      state.specialDuty = {};
      state.basePeople = [];
      state.previousDayFillReport = null;
      els.dateSelect.innerHTML = "";
      combinePeople();
      removeMissingAssignments();
      autoAssign();
    }

    function saveSchedule(matrixRows, fileName) {
      localStorage.setItem(keys.scheduleMatrix, JSON.stringify(matrixRows));
      localStorage.setItem(keys.scheduleMatrixVersion, "v2");
      localStorage.setItem(keys.scheduleFileName, fileName);
      updateImportDiagnosis({ fileName });
      updateFileStatus();
    }

    function loadSchedule() {
      try {
        if (localStorage.getItem(keys.scheduleMatrixVersion) !== "v2") {
          localStorage.removeItem(keys.scheduleMatrix);
          localStorage.removeItem(keys.scheduleFileName);
          localStorage.removeItem(keys.selectedDateColumn);
          localStorage.removeItem(keys.scheduleMatrixVersion);
          return false;
        }
        const text = localStorage.getItem(keys.scheduleMatrix);
        if (!text) return false;
        return setupSchedule(JSON.parse(text), localStorage.getItem(keys.selectedDateColumn) || "");
      } catch {
        return false;
      }
    }

    function updateFileStatus() {
      const fileName = localStorage.getItem(keys.scheduleFileName);
      els.fileStatus.textContent = fileName ? `已记忆：${fileName}` : "未记忆排班表。";
    }

    function normalizeTemplateText(text) {
      const names = text.split(/\r?\n/).map(norm).filter(Boolean);
      const expandedNames = [];
      for (const name of names) {
        if (name === "总值班/二线班") {
          expandedNames.push("总值班", "二线班");
          continue;
        }
        expandedNames.push(name);
      }
      return expandedNames.length ? expandedNames.join("\n") : DEFAULT_TEMPLATE_TEXT;
    }

    function applyTemplate() {
      saveCurrentSlotAssignments();
      state.previousDayFillReport = null;
      els.templateText.value = normalizeTemplateText(els.templateText.value);
      const names = els.templateText.value.split(/\r?\n/).map(norm).filter(Boolean);
      const previousAssignments = new Map();
      for (const slot of state.slots) {
        const title = norm(slot.title);
        if (!previousAssignments.has(title)) previousAssignments.set(title, []);
        previousAssignments.get(title).push([...slot.peopleIds]);
      }
      state.slots = names.map(title => ({
        id: id("s"),
        title,
        peopleIds: previousAssignments.get(title)?.shift() || []
      }));
      localStorage.setItem(keys.templateText, els.templateText.value);
      autoAssign();
      restoreSavedSlotAssignmentsForDate();
      saveCurrentSlotAssignments();
      render();
    }

    function isNightBlockedForRegular(person) {
      const value = norm(person?.shift).replace(/\s/g, "");
      return value.includes("夜休") || value.includes("夜班") || value === "夜";
    }

    function isMountainBackup(person) {
      return norm(person?.shift).replace(/\s/g, "").includes("备山");
    }

    function isRecoveryShift(person) {
      return norm(person?.shift).replace(/\s/g, "").includes("恢");
    }

    function selectedDateColumn() {
      const selectedCol = Number(els.dateSelect.value || state.dateColumns[0]?.colIndex || 0);
      return state.dateColumns.find(item => item.colIndex === selectedCol) || null;
    }

    function dateAssignmentKey(colIndex = state.activeDateColumn) {
      const fileName = localStorage.getItem(keys.scheduleFileName) || "current";
      return `${fileName}::${colIndex}`;
    }

    function dateAssignmentFallbackKey(colIndex = state.activeDateColumn) {
      return `column::${colIndex}`;
    }

    function readSlotAssignmentsByDate() {
      try {
        return JSON.parse(localStorage.getItem(keys.slotAssignmentsByDate) || "{}");
      } catch {
        return {};
      }
    }

    function writeSlotAssignmentsByDate(assignments) {
      localStorage.setItem(keys.slotAssignmentsByDate, JSON.stringify(assignments));
    }

    function saveCurrentSlotAssignments(colIndex = state.activeDateColumn) {
      if (!colIndex) return;
      const assignments = readSlotAssignmentsByDate();
      const snapshot = state.slots.map(slot => ({
        title: slot.title,
        names: slot.peopleIds.map(personById).filter(Boolean).map(person => person.name)
      }));
      assignments[dateAssignmentKey(colIndex)] = snapshot;
      assignments[dateAssignmentFallbackKey(colIndex)] = snapshot;
      writeSlotAssignmentsByDate(assignments);
    }

    function savedAssignmentsForDate(colIndex) {
      const assignments = readSlotAssignmentsByDate();
      return assignments[dateAssignmentKey(colIndex)] || assignments[dateAssignmentFallbackKey(colIndex)] || [];
    }

    function personByName(name) {
      const target = norm(name);
      return state.people.find(person => norm(person.name) === target) || null;
    }

    function addPersonToSlot(slot, personId) {
      if (!slot || !personId) return false;
      if (slot.peopleIds.includes(personId)) return false;
      slot.peopleIds.push(personId);
      return true;
    }

    function restoreSavedSlotAssignmentsForDate(colIndex = state.activeDateColumn) {
      const savedSlots = savedAssignmentsForDate(colIndex);
      if (!savedSlots.length) return;
      const savedByTitle = new Map();
      for (const savedSlot of savedSlots) {
        const title = norm(savedSlot.title);
        if (!savedByTitle.has(title)) savedByTitle.set(title, []);
        savedByTitle.get(title).push([...(savedSlot.names || [])]);
      }
      for (const slot of state.slots) {
        if (isFixedTemplateSlotTitle(slot.title)) continue;
        const names = savedByTitle.get(norm(slot.title))?.shift() || [];
        for (const name of names) {
          const person = personByName(name);
          if (person) addPersonToSlot(slot, person.id);
        }
      }
    }

    function regularSlots() {
      return state.slots.filter(slot => !isFixedTemplateSlotTitle(slot.title));
    }

    function findPreviousDateColumn() {
      const selectedDate = selectedDateColumn();
      if (!selectedDate) return { error: "未找到前一天日期列，无法自动参考前一天排班。" };
      if (selectedDate.day === 1) return { error: "当前为本月1日，无法自动读取前一天，请手动排班。" };
      const previousDate = state.dateColumns.find(item => item.day === selectedDate.day - 1);
      if (!previousDate) return { error: "未找到前一天日期列，无法自动参考前一天排班。" };
      return { previousDate };
    }

    function getPreviousDayRegularPeopleBySlot(previousCol) {
      const peopleBySlot = new Map();
      const savedSlots = savedAssignmentsForDate(previousCol.colIndex);
      if (savedSlots.length) {
        for (const savedSlot of savedSlots) {
          const title = norm(savedSlot.title);
          if (!title || isFixedTemplateSlotTitle(title)) continue;
          if (!peopleBySlot.has(title)) peopleBySlot.set(title, []);
          for (const name of savedSlot.names || []) peopleBySlot.get(title).push(name);
        }
        return peopleBySlot;
      }

      const titles = new Set(regularSlots().map(slot => norm(slot.title)));
      const selectedDate = selectedDateColumn();
      const startRow = (selectedDate?.dateRowIndex ?? previousCol.dateRowIndex) + 2;
      for (let r = startRow; r < state.matrixRows.length; r += 1) {
        const row = state.matrixRows[r] || [];
        const name = norm(row[0]);
        const previousShift = norm(row[previousCol.colIndex]);
        if (!name || !previousShift || !titles.has(previousShift)) continue;
        if (!peopleBySlot.has(previousShift)) peopleBySlot.set(previousShift, []);
        peopleBySlot.get(previousShift).push(name);
      }
      return peopleBySlot;
    }

    function addUniqueName(list, name) {
      if (name && !list.includes(name)) list.push(name);
    }

    function createPreviousDayReport(type = "good", message = "") {
      return {
        type,
        message,
        successCount: 0,
        skippedCount: 0,
        nightBlocked: [],
        mountainBlocked: [],
        missingPeople: [],
        emptySlots: [],
        source: ""
      };
    }

    function fillRegularSlotsFromPreviousDay() {
      saveCurrentSlotAssignments();
      const report = createPreviousDayReport();
      const previousLookup = findPreviousDateColumn();
      if (previousLookup.error) {
        state.previousDayFillReport = createPreviousDayReport("warn", previousLookup.error);
        render();
        return;
      }

      const slots = regularSlots();
      const usedSavedAssignments = savedAssignmentsForDate(previousLookup.previousDate.colIndex).length > 0;
      const previousPeopleBySlot = getPreviousDayRegularPeopleBySlot(previousLookup.previousDate);
      if (!slots.length) {
        state.previousDayFillReport = createPreviousDayReport("warn", "没有可填入的常规岗位。");
        render();
        return;
      }

      const peopleByName = new Map();
      for (const person of state.people) {
        const name = norm(person.name);
        if (name && !peopleByName.has(name)) peopleByName.set(name, person);
      }
      const usedPeople = new Set();
      for (const slot of slots) {
        for (const personId of slot.peopleIds) {
          if (personId) usedPeople.add(personId);
        }
      }

      let skippedSpecialSlots = false;
      let recoveryAutoFilled = false;

      for (const slot of slots) {
        const slotTitle = norm(slot.title);

        if (slotTitle === "胃镜室" || slotTitle === "青龙山") {
          skippedSpecialSlots = true;
          continue;
        }

        if (slotTitle === "恢复室") {
          let filledThisSlot = false;

          for (const person of state.people) {
            if (!isRecoveryShift(person)) continue;
            if (isNightBlockedForRegular(person)) {
              addUniqueName(report.nightBlocked, person.name);
              continue;
            }
            if (usedPeople.has(person.id)) continue;
            if (!addPersonToSlot(slot, person.id)) continue;

            usedPeople.add(person.id);
            report.successCount += 1;
            filledThisSlot = true;
            recoveryAutoFilled = true;
          }

          if (!filledThisSlot) addUniqueName(report.emptySlots, slotTitle);
          continue;
        }

        const candidateNames = previousPeopleBySlot.get(slotTitle) || [];
        let filledThisSlot = false;
        if (!candidateNames.length) addUniqueName(report.emptySlots, slotTitle);

        for (const name of candidateNames) {
          const person = peopleByName.get(norm(name));
          if (!person) {
            addUniqueName(report.missingPeople, name);
            continue;
          }
          if (isNightBlockedForRegular(person)) {
            addUniqueName(report.nightBlocked, person.name);
            continue;
          }
          if (isMountainBackup(person) && slotTitle !== "青龙山") {
            addUniqueName(report.mountainBlocked, person.name);
            continue;
          }
          if (usedPeople.has(person.id)) continue;
          if (!addPersonToSlot(slot, person.id)) continue;
          usedPeople.add(person.id);
          report.successCount += 1;
          filledThisSlot = true;
        }

        if (!filledThisSlot && candidateNames.length) addUniqueName(report.emptySlots, slotTitle);
      }

      report.skippedCount = report.nightBlocked.length + report.mountainBlocked.length + report.missingPeople.length;
      report.message = `已参考前一天填入常规岗位：成功 ${report.successCount} 人，跳过 ${report.skippedCount} 人。`;
      report.type = report.successCount ? "good" : "warn";
      const sourceParts = [];
      sourceParts.push(usedSavedAssignments ? "已读取前一天保存的网页排班。" : "未读到前一天保存的网页排班，已改用 Excel 前一天班次参考。");
      if (skippedSpecialSlots) sourceParts.push("胃镜室、青龙山未参考前一天。");
      if (recoveryAutoFilled) sourceParts.push("恢复室已按今天班次“恢”自动填入。");
      report.source = sourceParts.join(" ");
      state.previousDayFillReport = report;
      removeMissingAssignments();
      saveCurrentSlotAssignments();
      render();
    }

    function autoAssign() {
      for (const slot of state.slots) {
        if (AUTO_ASSIGN_SLOT_TITLES.has(norm(slot.title))) slot.peopleIds = [];
      }
      for (const person of state.people) {
        const title = autoSlotTitle(person);
        if (!title) continue;
        const slot = state.slots.find(item => item.title === title);
        if (slot && !slot.peopleIds.includes(person.id)) slot.peopleIds.push(person.id);
        if (title === "备山") {
          const mountainSlot = state.slots.find(item => item.title === "青龙山");
          if (mountainSlot && !mountainSlot.peopleIds.includes(person.id)) mountainSlot.peopleIds.push(person.id);
        }
      }
      for (const [slotTitle, personName] of Object.entries(state.specialDuty)) {
        const slot = state.slots.find(item => norm(item.title) === norm(slotTitle));
        const person = state.people.find(item => norm(item.name) === norm(personName));
        if (slot && person && !slot.peopleIds.includes(person.id)) slot.peopleIds.push(person.id);
      }
    }

    function autoSlotTitle(person) {
      const fixedSlot = AUTO_ASSIGN_NAME_TO_SLOT.get(norm(person.name));
      if (fixedSlot) return fixedSlot;
      const value = norm(person.shift).replace(/\s/g, "");
      if (!value || value.includes("夜休")) return "";
      if (value === "夜" || value.includes("夜班")) return "夜班";
      if (value.includes("备山")) return "备山";
      if (value.includes("二备")) return "二备";
      if (value.includes("二线")) return "二线班";
      if (value.includes("备")) return "备班";
      if (value.includes("胃")) return "胃镜室";
      if (value.includes("山")) return "青龙山";
      return "";
    }

    function assignToSlot(slotId, personId = state.selectedPersonId) {
      const slot = state.slots.find(item => item.id === slotId);
      if (!slot || !personId) return;
      addPersonToSlot(slot, personId);
      state.selectedPersonId = "";
      removeMissingAssignments();
      saveCurrentSlotAssignments();
      render();
    }

    function removeAssignment(slotId, personId, index) {
      const slot = state.slots.find(item => item.id === slotId);
      if (!slot) return;
      let seen = -1;
      const found = slot.peopleIds.findIndex(idValue => {
        if (idValue !== personId) return false;
        seen += 1;
        return seen === index;
      });
      if (found >= 0) slot.peopleIds.splice(found, 1);
      saveCurrentSlotAssignments();
      render();
    }

    function removePerson(personId) {
      const person = personById(personId);
      if (!person) return;
      const assignments = state.slots
        .map(slot => ({
          slotId: slot.id,
          indexes: slot.peopleIds.map((idValue, indexValue) => idValue === personId ? indexValue : -1).filter(indexValue => indexValue >= 0)
        }))
        .filter(item => item.indexes.length);
      const key = personKey(person);
      if (!state.hiddenPeopleKeys.includes(key)) {
        state.hiddenPeopleKeys.push(key);
      }
      state.lastRemovedPerson = { person: { ...person }, assignments };
      state.people = state.people.filter(item => item.id !== personId);
      for (const slot of state.slots) {
        slot.peopleIds = slot.peopleIds.filter(idValue => idValue !== personId);
      }
      saveCurrentSlotAssignments();
      render();
    }

    function restoreRemovedPerson() {
      const snapshot = state.lastRemovedPerson;
      if (!snapshot) return;
      state.hiddenPeopleKeys = state.hiddenPeopleKeys.filter(key => key !== personKey(snapshot.person));
      if (!state.people.some(item => item.id === snapshot.person.id)) {
        state.people.push({ ...snapshot.person });
      }
      for (const entry of snapshot.assignments) {
        const slot = state.slots.find(item => item.id === entry.slotId);
        if (!slot) continue;
        for (const indexValue of entry.indexes) {
          const insertAt = Math.max(0, Math.min(indexValue, slot.peopleIds.length));
          slot.peopleIds.splice(insertAt, 0, snapshot.person.id);
        }
      }
      state.lastRemovedPerson = null;
      saveCurrentSlotAssignments();
      render();
    }

    function renderUndo() {
      if (!state.lastRemovedPerson) {
        els.undoBar.hidden = true;
        els.undoText.textContent = "";
        return;
      }
      els.undoBar.hidden = false;
      els.undoText.textContent = `已移除 ${state.lastRemovedPerson.person.name}`;
    }

    function removeMissingAssignments() {
      const valid = new Set(state.people.map(person => person.id));
      for (const slot of state.slots) slot.peopleIds = slot.peopleIds.filter(personId => valid.has(personId));
    }

    function getCounts(ignoreSpecial = false) {
      const counts = new Map();
      for (const slot of state.slots) {
        if (ignoreSpecial && ["夜班", "备班", "备办", "备山", "二备", "二线班", "总值班/二线班"].includes(slot.title)) continue;
        for (const personId of slot.peopleIds) counts.set(personId, (counts.get(personId) || 0) + 1);
      }
      return counts;
    }

    function getSelectedCounts() {
      const counts = new Map();
      for (const slot of state.slots) {
        if (IGNORED_SELECTED_SLOT_TITLES.has(norm(slot.title))) continue;
        for (const personId of slot.peopleIds) counts.set(personId, (counts.get(personId) || 0) + 1);
      }
      return counts;
    }

    function personById(personId) {
      return state.people.find(person => person.id === personId);
    }

    function formatPersonOptionLabel(person, counts) {
      const assignedCount = counts.get(person.id) || 0;
      const suffix = assignedCount > 0 ? " 🟡" : "";
      const base = [person.name, person.shift || ""].filter(Boolean).join(" ");
      return `${base}${suffix}`;
    }

    function isFixedTemplateSlotTitle(title) {
      return FIXED_TEMPLATE_SLOT_TITLES.has(norm(title));
    }

    function fixedNightPersonIds() {
      const ids = new Set();
      for (const slot of state.slots) {
        if (norm(slot.title) !== "夜班") continue;
        for (const personId of slot.peopleIds) ids.add(personId);
      }
      return ids;
    }

    function formatPersonWithShift(person) {
      const shift = norm(person?.shift);
      return `${person.name}${shift ? `（${shift}）` : ""}`;
    }

    function getMissingPeople(counts) {
      const nightIds = fixedNightPersonIds();
      return state.people.filter(person => !counts.has(person.id) && !nightIds.has(person.id) && !isMissingExempt(person));
    }

    function renderPeopleReminder() {
      const counts = getSelectedCounts();
      const duplicateCounts = getSelectedCounts();
      const missing = getMissingPeople(counts);
      const duplicates = state.people.filter(person => (duplicateCounts.get(person.id) || 0) > 1);
      if (!state.people.length) {
        els.peopleReminder.innerHTML = "";
        return;
      }
      if (duplicates.length) {
        els.peopleReminder.innerHTML = `<div class="status bad">普通岗位重复 ${duplicates.length} 人：${escapeHtml(duplicates.map(person => person.name).join("、"))}</div>`;
        return;
      }
      if (missing.length) {
        els.peopleReminder.innerHTML = `<div class="status warn">还有 ${missing.length} 人未排：${escapeHtml(missing.map(formatPersonWithShift).join("、"))}</div>`;
        return;
      }
      els.peopleReminder.innerHTML = `<div class="status good">目前普通岗位已排完。</div>`;
    }

    function renderPreviousDayFillReport() {
      const report = state.previousDayFillReport;
      if (!report) {
        els.previousDayReport.innerHTML = "";
        return;
      }
      const lines = [report.message];
      if (report.source) lines.push(report.source);
      if (report.nightBlocked?.length) lines.push(`因今天夜班/夜休未填入：${report.nightBlocked.join("、")}。`);
      if (report.mountainBlocked?.length) lines.push(`因今天备山只能进入青龙山，未填入其他岗位：${report.mountainBlocked.join("、")}。`);
      if (report.missingPeople?.length) lines.push(`今天不在人员池中，未填入：${report.missingPeople.join("、")}。`);
      if (report.emptySlots?.length) lines.push(`未找到可填人员的岗位：${report.emptySlots.join("、")}。`);
      els.previousDayReport.innerHTML = lines
        .map((line, index) => `<div class="status ${index === 0 ? report.type : "warn"}">${escapeHtml(line)}</div>`)
        .join("");
    }

    function renderPeople() {
      const counts = getSelectedCounts();
      els.peopleCount.textContent = `${state.people.length}人`;
      renderPeopleReminder();
      if (!state.people.length) {
        els.peopleList.innerHTML = `<div class="hint">请先导入 Excel，或刷新表外人员。</div>`;
        return;
      }
      els.peopleList.innerHTML = "";
      for (const person of state.people) {
        const row = document.createElement("div");
        row.className = "chip-row";
        const chip = document.createElement("div");
        chip.className = `chip ${counts.has(person.id) ? "assigned" : ""}`;
        chip.classList.add("chip-main");
        chip.innerHTML = `<div class="chip-head"><div class="name">${escapeHtml(person.name)}</div>${counts.has(person.id) ? '<span class="assigned-mark">★</span>' : ""}</div><div class="shift">${escapeHtml(person.shift || "未备注")}</div>`;
        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.className = "chip-remove";
        removeButton.title = `删除 ${person.name}`;
        removeButton.setAttribute("aria-label", `删除 ${person.name}`);
        removeButton.textContent = "×";
        removeButton.addEventListener("click", () => removePerson(person.id));
        row.append(chip, removeButton);
        els.peopleList.appendChild(row);
      }
    }

    function buildSlotCard(slot, counts) {
      const slotEl = document.createElement("div");
      slotEl.className = "slot";
      const selectedOptions = state.people.map(person => `<option value="${person.id}">${escapeHtml(formatPersonOptionLabel(person, counts))}</option>`).join("");
      slotEl.innerHTML = `
        <div class="slot-head">
          <div class="slot-title">${escapeHtml(slot.title)}</div>
          <span class="hint">${slot.peopleIds.length}人</span>
        </div>
        <div class="slot-body">
          <div class="assigned-list"></div>

          <div class="slot-search">
            <input
              class="slot-search-input"
              type="search"
              inputmode="search"
              autocomplete="off"
              placeholder="搜索姓名/班次"
              data-search="${slot.id}"
            />
            <div class="slot-search-results" data-search-results="${slot.id}"></div>
          </div>

          <div class="slot-actions">
            <select data-select="${slot.id}"><option value="">从人员池选择</option>${selectedOptions}</select>
            <button type="button" data-pick="${slot.id}">选入</button>
          </div>
        </div>
      `;
      const list = slotEl.querySelector(".assigned-list");
      slot.peopleIds.forEach((personId, index) => {
        const person = personById(personId);
        if (!person) return;
        const pill = document.createElement("span");
        pill.className = "assigned-pill";
        pill.innerHTML = `${escapeHtml(person.name)} <button type="button">×</button>`;
        pill.querySelector("button").addEventListener("click", () => removeAssignment(slot.id, personId, index));
        list.appendChild(pill);
      });

      const searchInput = slotEl.querySelector(`[data-search="${slot.id}"]`);
      const searchResults = slotEl.querySelector(`[data-search-results="${slot.id}"]`);

      function renderSearchResults() {
        const keyword = norm(searchInput.value).replace(/\s/g, "");
        searchResults.innerHTML = "";

        if (!keyword) return;

        const matchedPeople = state.people
          .filter(person => {
            const name = norm(person.name).replace(/\s/g, "");
            const shift = norm(person.shift).replace(/\s/g, "");
            return name.includes(keyword) || shift.includes(keyword);
          })
          .slice(0, 8);

        if (!matchedPeople.length) {
          searchResults.innerHTML = `<div class="slot-search-empty">没有匹配人员</div>`;
          return;
        }

        for (const person of matchedPeople) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "slot-search-result";

          const shift = norm(person.shift);
          const assignedText = counts.has(person.id) ? " 已排" : "";
          button.textContent = `${person.name}${shift ? `（${shift}）` : ""}${assignedText}`;

          button.addEventListener("click", () => {
            assignToSlot(slot.id, person.id);
            searchInput.value = "";
            searchResults.innerHTML = "";
          });

          searchResults.appendChild(button);
        }
      }

      searchInput.addEventListener("input", renderSearchResults);

      slotEl.querySelector(`[data-pick="${slot.id}"]`).addEventListener("click", () => {
        const select = slotEl.querySelector(`[data-select="${slot.id}"]`);
        assignToSlot(slot.id, select.value);
        select.value = "";
      });
      return slotEl;
    }

    function appendSlotGroup(title, slots, counts) {
      if (!slots.length) return;
      const groupEl = document.createElement("section");
      groupEl.className = "slot-group";
      groupEl.innerHTML = `
        <div class="slot-group-head">
          <div class="slot-group-title">${escapeHtml(title)}</div>
          <span class="hint">${slots.length}项</span>
        </div>
        <div class="slot-group-list"></div>
      `;
      const listEl = groupEl.querySelector(".slot-group-list");
      slots.forEach(slot => listEl.appendChild(buildSlotCard(slot, counts)));
      els.slots.appendChild(groupEl);
    }

    function renderSlots() {
      const counts = getSelectedCounts();
      const regularSlots = [];
      const fixedSlots = [];
      els.slots.innerHTML = "";
      for (const slot of state.slots) {
        if (isFixedTemplateSlotTitle(slot.title)) fixedSlots.push(slot);
        else regularSlots.push(slot);
      }
      appendSlotGroup("常规岗位", regularSlots, counts);
      appendSlotGroup("固定岗位", fixedSlots, counts);
    }

    function isMissingExempt(person) {
      const shift = norm(person.shift).replace(/\s/g, "");
      return shift.includes("夜班") || shift.includes("夜休") || shift === "夜";
    }

    function renderStatus() {
      const counts = getCounts(true);
      const duplicateCounts = getCounts(true);
      const missing = getMissingPeople(counts);
      const duplicates = state.people.filter(person => (duplicateCounts.get(person.id) || 0) > 1);
      const statuses = [];
      if (!state.people.length) statuses.push({ type: "warn", text: "还没有人员。" });
      else if (!missing.length && !duplicates.length) statuses.push({ type: "good", text: "没有遗漏，也没有普通岗位重复。" });
      if (missing.length) statuses.push({ type: "warn", text: `遗漏 ${missing.length} 人：${missing.map(formatPersonWithShift).join("、")}` });
      if (duplicates.length) statuses.push({ type: "bad", text: `重复 ${duplicates.length} 人：${duplicates.map(p => p.name).join("、")}` });
      els.statusList.innerHTML = statuses.map(item => `<div class="status ${item.type}">${escapeHtml(item.text)}</div>`).join("");
    }

    function outputLine(title, names) {
      const text = names.length ? names.join(title.includes("青龙山") || title.includes("胃镜") ? " " : "、") : "未安排";
      return `${title}：${text}`;
    }

    function formatName(person, title) {
      return `${/号间|胃镜|青龙山/.test(title) ? "@" : ""}${person.name}`;
    }

    function getCombinedDutyLine() {
      const totalSlot = state.slots.find(slot => norm(slot.title) === "总值班");
      const secondSlot = state.slots.find(slot => norm(slot.title) === "二线班");
      const totalNames = totalSlot ? totalSlot.peopleIds.map(personById).filter(Boolean).map(person => person.name) : [];
      const secondNames = secondSlot ? secondSlot.peopleIds.map(personById).filter(Boolean).map(person => person.name) : [];
      const separatedNames = [...new Set([...totalNames, ...secondNames])];
      if (separatedNames.length) return `总值班、二线班：${separatedNames.join("、")}`;
      const combinedSlot = state.slots.find(slot => norm(slot.title) === "总值班/二线班");
      const combinedNames = combinedSlot ? combinedSlot.peopleIds.map(personById).filter(Boolean).map(person => person.name) : [];
      const uniqueCombined = [...new Set(combinedNames)];
      if (uniqueCombined.length) return `总值班、二线班：${uniqueCombined.join("、")}`;
      const total = state.specialDuty["总值班"];
      const second = state.specialDuty["二线班"];
      if (!total && !second) return "";
      return `总值班、二线班：${total && second && total === second ? total : [total, second].filter(Boolean).join("、")}`;
    }

    function getDailyWarmMessage() {
      const day = state.dateColumns.find(item => item.label === state.selectedDateLabel)?.day;
      if (!day || !DAILY_WARM_MESSAGES.length) return "";
      return DAILY_WARM_MESSAGES[(day - 1) % DAILY_WARM_MESSAGES.length];
    }

    function generateOutput() {
      const lines = [];
      const scheduleLines = [];
      if (state.selectedDateLabel) lines.push(`${state.selectedDateLabel}排班`);
      for (const slot of state.slots) {
        if (["总值班/二线班", "总值班", "二线班"].includes(norm(slot.title))) continue;
        const names = slot.peopleIds.map(personById).filter(Boolean).map(person => formatName(person, slot.title));
        scheduleLines.push(outputLine(slot.title, names));
      }
      if (scheduleLines.length) lines.push("", ...scheduleLines);
      const combinedDutyLine = getCombinedDutyLine();
      if (combinedDutyLine) lines.push("", combinedDutyLine);
      const notes = norm(els.notesText.value);
      if (notes) lines.push("", `备注：${notes}`);
      lines.push("", "总值班随时进行人员协调！");
      const warmMessage = getDailyWarmMessage();
      if (warmMessage) lines.push(`💫 ${warmMessage}`);
      els.outputText.value = lines.filter((line, index, array) => !(line === "" && array[index - 1] === "")).join("\n");
    }

    function render() {
      renderImportDiagnosis();
      renderPeople();
      renderPreviousDayFillReport();
      renderUndo();
      renderSlots();
      renderStatus();
      generateOutput();
      renderStep();
    }

    function renderStep() {
      document.querySelectorAll("[data-step-panel]").forEach(panel => {
        panel.hidden = Number(panel.dataset.stepPanel) !== currentStep;
      });
      document.querySelectorAll("[data-step-tab]").forEach(tab => {
        tab.classList.toggle("active", Number(tab.dataset.stepTab) === currentStep);
      });
      els.prevStep.hidden = currentStep === 0;
      els.nextStep.hidden = currentStep === 2;
      els.nextStep.textContent = "下一步";
      document.querySelector(".secondary-actions").classList.toggle("single", currentStep === 0 || currentStep === 2);
    }

    function goStep(step) {
      saveCurrentSlotAssignments();
      currentStep = Math.max(0, Math.min(2, step));
      renderStep();
    }

    function escapeHtml(value) {
      return norm(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }

    function clearSlotAssignments() {
      state.previousDayFillReport = null;
      for (const slot of state.slots) slot.peopleIds = [];
      autoAssign();
      saveCurrentSlotAssignments();
      render();
    }

    function parseWorkbook(file) {
      const reader = new FileReader();
      state.previousDayFillReport = null;
      localStorage.removeItem(keys.slotAssignmentsByDate);
      updateImportDiagnosis({
        status: "parsing",
        fileName: file.name,
        errorMessage: "",
        previewExpanded: false,
        summary: createEmptyImportSummary()
      });
      render();
      reader.onload = event => {
        try {
          const workbook = XLSX.read(new Uint8Array(event.target.result), { type: "array" });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const matrixRows = matrixFromSheet(sheet);
          if (!setupSchedule(matrixRows)) {
            resetImportedScheduleState();
            updateImportDiagnosis({
              status: "no_dates",
              fileName: file.name,
              errorMessage: "",
              previewExpanded: false
            });
            render();
            alert("没有识别到横向日期排班表，请查看下方导入诊断信息。");
            return;
          }
          saveSchedule(matrixRows, file.name);
          localStorage.setItem(keys.selectedDateColumn, els.dateSelect.value || "");
          updateImportDiagnosis({
            fileName: file.name,
            errorMessage: "",
            previewExpanded: false
          });
          render();
        } catch (error) {
          updateImportDiagnosis({
            status: "error",
            fileName: file.name,
            errorMessage: error.message || String(error),
            previewExpanded: false,
            summary: createEmptyImportSummary()
          });
          render();
          alert(`导入失败，请查看下方导入诊断信息。\n原始错误：${error.message || String(error)}`);
        }
      };
      reader.readAsArrayBuffer(file);
    }

    els.fileInput.addEventListener("change", event => {
      const file = event.target.files[0];
      if (file) parseWorkbook(file);
    });

    els.dateSelect.addEventListener("change", () => {
      saveCurrentSlotAssignments();
      localStorage.setItem(keys.selectedDateColumn, els.dateSelect.value || "");
      rebuildPeopleFromDate();
    });

    els.outsidePeople.addEventListener("input", () => {
      localStorage.setItem(keys.outsideText, els.outsidePeople.value);
    });

    els.refreshOutside.addEventListener("click", () => {
      state.previousDayFillReport = null;
      state.outsidePeople = parsePeopleText(els.outsidePeople.value).map(person => ({ ...person, source: "outside" }));
      combinePeople();
      removeMissingAssignments();
      autoAssign();
      render();
    });

    els.applyTemplate.addEventListener("click", applyTemplate);
    els.fillFromPreviousDay.addEventListener("click", fillRegularSlotsFromPreviousDay);
    els.undoRemove.addEventListener("click", restoreRemovedPerson);
    els.clearTemplateAssignments.addEventListener("click", clearSlotAssignments);
    els.templateText.addEventListener("input", () => localStorage.setItem(keys.templateText, els.templateText.value));
    els.notesText.addEventListener("input", () => {
      localStorage.setItem(keys.notesText, els.notesText.value);
      generateOutput();
    });
    els.clearAssignments.addEventListener("click", clearSlotAssignments);
    els.clearAll.addEventListener("click", () => {
      state.people = [];
      state.basePeople = [];
      state.outsidePeople = [];
      state.matrixRows = [];
      state.dateColumns = [];
      state.specialDuty = {};
      state.selectedDateLabel = "";
      state.activeDateColumn = "";
      state.selectedPersonId = "";
      state.hiddenPeopleKeys = [];
      state.lastRemovedPerson = null;
      state.importDiagnosis = createEmptyImportDiagnosis();
      state.previousDayFillReport = null;
      els.dateSelect.innerHTML = "";
      localStorage.removeItem(keys.scheduleMatrix);
      localStorage.removeItem(keys.scheduleFileName);
      localStorage.removeItem(keys.selectedDateColumn);
      localStorage.removeItem(keys.scheduleMatrixVersion);
      localStorage.removeItem(keys.slotAssignmentsByDate);
      updateFileStatus();
      render();
    });
    els.copyText.addEventListener("click", async () => {
      generateOutput();
      try {
        await navigator.clipboard.writeText(els.outputText.value);
        els.copyText.textContent = "已复制";
        setTimeout(() => els.copyText.textContent = "复制微信版", 1200);
      } catch {
        els.outputText.select();
        document.execCommand("copy");
        els.copyText.textContent = "已复制";
        setTimeout(() => els.copyText.textContent = "复制微信版", 1200);
      }
    });
    els.prevStep.addEventListener("click", () => goStep(currentStep - 1));
    els.nextStep.addEventListener("click", () => goStep(currentStep === 2 ? 0 : currentStep + 1));
    document.querySelectorAll("[data-step-tab]").forEach(tab => {
      tab.addEventListener("click", () => goStep(Number(tab.dataset.stepTab)));
    });

    const savedTemplate = localStorage.getItem(keys.templateText);
    const savedNotes = localStorage.getItem(keys.notesText);
    const savedOutside = localStorage.getItem(keys.outsideText);
    if (savedTemplate !== null) {
      const normalizedTemplate = normalizeTemplateText(savedTemplate);
      els.templateText.value = LEGACY_TEMPLATE_TEXTS.has(normalizedTemplate) ? DEFAULT_TEMPLATE_TEXT : normalizedTemplate;
    } else {
      els.templateText.value = DEFAULT_TEMPLATE_TEXT;
    }
    if (savedNotes !== null) els.notesText.value = savedNotes;
    if (savedOutside !== null) els.outsidePeople.value = savedOutside;
    state.outsidePeople = parsePeopleText(els.outsidePeople.value).map(person => ({ ...person, source: "outside" }));
    applyTemplate();
    const loadedFromMemory = loadSchedule();
    if (loadedFromMemory) {
      updateImportDiagnosis({
        status: "memory",
        fileName: localStorage.getItem(keys.scheduleFileName) || "",
        errorMessage: "",
        previewExpanded: false
      });
    }
    updateFileStatus();
    render();
  </script>
</body>
</html>
