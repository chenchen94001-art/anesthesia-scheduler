<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>手机排班工具</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f7f8fb;
      --panel: #fff;
      --line: #d8dee8;
      --text: #172033;
      --muted: #667085;
      --brand: #2563eb;
      --brand-soft: #eaf1ff;
      --bad: #b42318;
      --bad-soft: #fff1f0;
      --warn: #92400e;
      --warn-soft: #fff7ed;
      --good: #067647;
      --good-soft: #ecfdf3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", system-ui, sans-serif;
      font-size: 14px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
    }

    h1 {
      margin: 0;
      font-size: 17px;
    }

    .sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    main {
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 8px 10px 0;
    }

    .step-tab {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 4px;
      font-size: 12px;
    }

    .step-tab.active {
      border-color: var(--brand);
      background: var(--brand-soft);
      color: var(--brand);
      font-weight: 700;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .panel[hidden] {
      display: none;
    }

    .panel-head {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }

    .panel-body {
      padding: 10px;
      display: grid;
      gap: 9px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      display: block;
      margin-bottom: 4px;
    }

    input, select, textarea, button {
      font: inherit;
    }

    input[type="file"], select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: #fff;
    }

    textarea {
      min-height: 76px;
      resize: vertical;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 6px;
      padding: 7px 9px;
      color: var(--text);
    }

    .primary {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }

    .ghost {
      border-color: transparent;
      background: transparent;
      color: var(--muted);
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .chips {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      max-height: 260px;
      overflow: auto;
    }

    .chip-row {
      position: relative;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      padding: 6px;
      min-width: 0;
      text-align: left;
    }

    .chip-main {
      width: 100%;
      cursor: default;
      padding-right: 20px;
    }

    .chip.selected {
      border-color: var(--brand);
      background: var(--brand-soft);
    }

    .chip.assigned {
      opacity: 0.55;
    }

    .chip-remove {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 16px;
      min-width: 16px;
      height: 16px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: #b42318;
      font-size: 11px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chip-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .assigned-mark {
      color: #f4b400;
      font-size: 14px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .name {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .shift {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .slots {
      display: grid;
      gap: 7px;
    }

    .template-actions {
      display: flex;
      justify-content: flex-end;
    }

    .undo-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border: 1px solid #f2d675;
      background: #fff8d9;
      border-radius: 8px;
      padding: 8px 10px;
    }

    .undo-bar[hidden] {
      display: none;
    }

    .slot {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfcfe;
      overflow: hidden;
    }

    .slot-head {
      padding: 6px 7px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      align-items: center;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    .slot-title {
      font-weight: 700;
      font-size: 13px;
    }

    .slot-body {
      padding: 7px;
      display: grid;
      gap: 6px;
    }

    .assigned-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      min-height: 24px;
    }

    .assigned-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 12px;
    }

    .assigned-pill button {
      border: 0;
      padding: 0;
      background: transparent;
      color: var(--muted);
      line-height: 1;
    }

    .slot-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
    }

    .status {
      border: 1px solid;
      border-radius: 7px;
      padding: 7px;
      font-size: 12px;
      line-height: 1.45;
    }

    .status.good { color: var(--good); background: var(--good-soft); border-color: #abefc6; }
    .status.warn { color: var(--warn); background: var(--warn-soft); border-color: #fed7aa; }
    .status.bad { color: var(--bad); background: var(--bad-soft); border-color: #fecaca; }

    .output {
      min-height: 220px;
      white-space: pre-wrap;
      line-height: 1.55;
    }

    .sticky-actions {
      position: sticky;
      bottom: 0;
      background: rgba(247, 248, 251, 0.96);
      padding: 8px 10px 10px;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .secondary-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 10px 10px;
    }

    .secondary-actions.single {
      grid-template-columns: 1fr;
    }

    @media (min-width: 760px) {
      main {
        grid-template-columns: 1fr;
        align-items: start;
      }
      .chips {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>手机排班工具</h1>
    <div class="sub">不用拖拽：在每个岗位下拉选择人员，再点“选入”。</div>
  </header>

  <nav class="steps" aria-label="排班步骤">
    <button class="step-tab active" type="button" data-step-tab="0">1 人员</button>
    <button class="step-tab" type="button" data-step-tab="1">2 模板</button>
    <button class="step-tab" type="button" data-step-tab="2">3 导出</button>
  </nav>

  <main>
    <section class="panel" data-step-panel="0">
      <div class="panel-head">
        <span>人员</span>
        <span class="hint" id="peopleCount">0人</span>
      </div>
      <div class="panel-body">
        <div>
          <label for="fileInput">导入 Excel</label>
          <input id="fileInput" type="file" accept=".xlsx,.xls,.csv" />
          <div class="hint" id="fileStatus">未记忆排班表。</div>
        </div>
        <div>
          <label for="dateSelect">排班日期</label>
          <select id="dateSelect"></select>
        </div>
        <div>
          <label for="outsidePeople">排班表外人员</label>
          <textarea id="outsidePeople" placeholder="每行一个人，只记忆在这里；点刷新后加入人员池。"></textarea>
          <button id="refreshOutside" class="primary" type="button">刷新表外人员</button>
        </div>
        <div class="chips" id="peopleList"></div>
        <div class="undo-bar" id="undoBar" hidden>
          <span class="hint" id="undoText"></span>
          <button id="undoRemove" type="button">撤回</button>
        </div>
      </div>
    </section>

    <section class="panel" data-step-panel="1" hidden>
      <div class="panel-head">
        <span>模板</span>
        <button id="applyTemplate" type="button">应用</button>
      </div>
      <div class="panel-body">
        <textarea id="templateText">1号间
2号间
5号间
6号间
7号间
10号间
11号间
恢复室
胃镜室
青龙山
总务
机动
2+5
6+7
10+11
恢复室
夜班
备班
备山
二备
总值班/二线班</textarea>
        <div class="template-actions">
          <button id="clearTemplateAssignments" type="button">清空</button>
        </div>
        <div class="slots" id="slots"></div>
      </div>
    </section>

    <section class="panel" data-step-panel="2" hidden>
      <div class="panel-head">
        <span>导出</span>
        <button id="copyText" class="primary" type="button">复制</button>
      </div>
      <div class="panel-body">
        <div id="statusList"></div>
        <div>
          <label for="notesText">备注</label>
          <textarea id="notesText" placeholder="备注会保存"></textarea>
        </div>
        <textarea id="outputText" class="output" readonly></textarea>
      </div>
    </section>
  </main>

  <div class="secondary-actions">
    <button id="prevStep" type="button">返回</button>
    <button id="nextStep" class="primary" type="button">下一步</button>
  </div>

  <div class="sticky-actions">
    <button id="clearAssignments" type="button">清空排班</button>
    <button id="clearAll" class="ghost" type="button">清空人员</button>
  </div>

  <script>
    const state = {
      matrixRows: [],
      dateColumns: [],
      selectedDateLabel: "",
      specialDuty: {},
      basePeople: [],
      outsidePeople: [],
      people: [],
      slots: [],
      selectedPersonId: "",
      hiddenPeopleKeys: [],
      lastRemovedPerson: null
    };

    const els = {
      fileInput: document.querySelector("#fileInput"),
      fileStatus: document.querySelector("#fileStatus"),
      dateSelect: document.querySelector("#dateSelect"),
      outsidePeople: document.querySelector("#outsidePeople"),
      refreshOutside: document.querySelector("#refreshOutside"),
      peopleList: document.querySelector("#peopleList"),
      peopleCount: document.querySelector("#peopleCount"),
      undoBar: document.querySelector("#undoBar"),
      undoText: document.querySelector("#undoText"),
      undoRemove: document.querySelector("#undoRemove"),
      templateText: document.querySelector("#templateText"),
      applyTemplate: document.querySelector("#applyTemplate"),
      clearTemplateAssignments: document.querySelector("#clearTemplateAssignments"),
      slots: document.querySelector("#slots"),
      statusList: document.querySelector("#statusList"),
      notesText: document.querySelector("#notesText"),
      outputText: document.querySelector("#outputText"),
      copyText: document.querySelector("#copyText"),
      prevStep: document.querySelector("#prevStep"),
      nextStep: document.querySelector("#nextStep"),
      clearAssignments: document.querySelector("#clearAssignments"),
      clearAll: document.querySelector("#clearAll")
    };

    let currentStep = 0;

    const keys = {
      scheduleMatrix: "mobileScheduler.scheduleMatrix.v1",
      scheduleMatrixVersion: "mobileScheduler.scheduleMatrixVersion.v2",
      scheduleFileName: "mobileScheduler.scheduleFileName.v1",
      selectedDateColumn: "mobileScheduler.selectedDateColumn.v1",
      outsideText: "mobileScheduler.outsideText.v1",
      templateText: "mobileScheduler.templateText.v1",
      notesText: "mobileScheduler.notesText.v1"
    };

    const DEFAULT_TEMPLATE_TEXT = [
      "1号间", "2号间", "5号间", "6号间", "7号间", "10号间", "11号间",
      "恢复室", "胃镜室", "青龙山", "总务", "机动",
      "2+5", "6+7", "10+11", "恢复室",
      "夜班", "备班", "备山", "二备", "总值班/二线班"
    ].join("\n");

    const LEGACY_TEMPLATE_TEXTS = new Set([
      [
        "2号间", "5号间", "6号间", "7号间", "10号间", "11号间",
        "恢复室", "胃镜室", "青龙山", "总务",
        "2+5", "6+7", "10+11", "恢复室补位",
        "夜班", "备班", "备山", "二备"
      ].join("\n"),
      [
        "1号间", "2号间", "5号间", "6号间", "7号间", "10号间", "11号间",
        "恢复室", "胃镜室", "青龙山", "总务",
        "2+5", "6+7", "10+11", "恢复室补位",
        "夜班", "备班", "备山", "二备"
      ].join("\n")
    ]);

    const IGNORED_SELECTED_SLOT_TITLES = new Set([
      "夜班", "备班", "备办", "备山", "二备", "总值班", "总值班/二线班"
    ]);

    const AUTO_ASSIGN_SLOT_TITLES = new Set([
      "夜班", "备班", "备山", "二备", "胃镜室", "青龙山", "总务", "机动"
    ]);

    const AUTO_ASSIGN_NAME_TO_SLOT = new Map([
      ["冷蔚蔚", "总务"],
      ["李玥豪", "机动"]
    ]);

    function id(prefix) {
      return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function personKey(person) {
      return `${norm(person?.name)}__${norm(person?.shift)}`;
    }

    function isHiddenPerson(person) {
      return state.hiddenPeopleKeys.includes(personKey(person));
    }

    function norm(value) {
      return String(value ?? "").trim();
    }

    function parsePeopleText(text) {
      return text.split(/\r?\n/)
        .map(norm)
        .filter(Boolean)
        .map(line => {
          const parts = line.split(/\s+/);
          return { id: id("p"), name: parts.shift() || "", shift: parts.join(" "), outside: true };
        })
        .filter(person => person.name);
    }

    function matrixFromSheet(sheet) {
      const matrixRows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
      for (const merge of sheet["!merges"] || []) {
        const topLeft = matrixRows[merge.s.r]?.[merge.s.c] ?? "";
        for (let r = merge.s.r; r <= merge.e.r; r += 1) {
          if (!matrixRows[r]) matrixRows[r] = [];
          for (let c = merge.s.c; c <= merge.e.c; c += 1) {
            matrixRows[r][c] = topLeft;
          }
        }
      }
      return matrixRows;
    }

    function setupSchedule(matrixRows, preferredCol = "") {
      state.matrixRows = matrixRows;
      state.dateColumns = [];
      const dateRowIndex = matrixRows.findIndex(row => row.filter(value => Number.isInteger(Number(value)) && Number(value) >= 1 && Number(value) <= 31).length >= 5);
      if (dateRowIndex < 0) return false;
      const dateRow = matrixRows[dateRowIndex];
      const monthText = norm(dateRow[0]) || "本月";
      state.dateColumns = dateRow.map((value, colIndex) => ({ value, colIndex }))
        .filter(item => item.colIndex > 0 && Number.isInteger(Number(item.value)) && Number(item.value) >= 1 && Number(item.value) <= 31)
        .map(item => ({ colIndex: item.colIndex, day: Number(item.value), label: `${monthText}${Number(item.value)}日`, dateRowIndex }));
      els.dateSelect.innerHTML = state.dateColumns.map(item => `<option value="${item.colIndex}">${escapeHtml(item.label)}</option>`).join("");
      const preferred = state.dateColumns.find(item => String(item.colIndex) === String(preferredCol));
      const today = state.dateColumns.find(item => item.day === new Date().getDate());
      if (preferred) els.dateSelect.value = preferred.colIndex;
      else if (today) els.dateSelect.value = today.colIndex;
      rebuildPeopleFromDate();
      return true;
    }

    function rebuildPeopleFromDate() {
      state.basePeople = [];
      state.specialDuty = {};
      const selectedCol = Number(els.dateSelect.value || state.dateColumns[0]?.colIndex || 0);
      const selectedDate = state.dateColumns.find(item => item.colIndex === selectedCol);
      if (!selectedDate) {
        combinePeople();
        render();
        return;
      }
      state.selectedDateLabel = selectedDate.label;
      const startRow = selectedDate.dateRowIndex + 2;
      for (let r = startRow; r < state.matrixRows.length; r++) {
        const row = state.matrixRows[r] || [];
        const name = norm(row[0]);
        const shift = norm(row[selectedCol]);
        if (!name) continue;
        if (["总值班", "二线班"].includes(name)) {
          state.specialDuty[name] = shift;
          continue;
        }
        state.basePeople.push({ id: id("p"), name, shift, source: "base" });
      }
      combinePeople();
      removeMissingAssignments();
      autoAssign();
      render();
    }

    function combinePeople() {
      const seen = new Set();
      state.people = [];
      for (const person of [...state.basePeople, ...state.outsidePeople]) {
        const key = `${person.name}__${person.shift}`;
        if (seen.has(key) || isHiddenPerson(person)) continue;
        state.people.push({ ...person, id: id("p"), source: person.source || "base" });
        seen.add(key);
      }
    }

    function saveSchedule(matrixRows, fileName) {
      localStorage.setItem(keys.scheduleMatrix, JSON.stringify(matrixRows));
      localStorage.setItem(keys.scheduleMatrixVersion, "v2");
      localStorage.setItem(keys.scheduleFileName, fileName);
      updateFileStatus();
    }

    function loadSchedule() {
      try {
        if (localStorage.getItem(keys.scheduleMatrixVersion) !== "v2") {
          localStorage.removeItem(keys.scheduleMatrix);
          localStorage.removeItem(keys.scheduleFileName);
          localStorage.removeItem(keys.selectedDateColumn);
          localStorage.removeItem(keys.scheduleMatrixVersion);
          return false;
        }
        const text = localStorage.getItem(keys.scheduleMatrix);
        if (!text) return false;
        return setupSchedule(JSON.parse(text), localStorage.getItem(keys.selectedDateColumn) || "");
      } catch {
        return false;
      }
    }

    function updateFileStatus() {
      const fileName = localStorage.getItem(keys.scheduleFileName);
      els.fileStatus.textContent = fileName ? `已记忆：${fileName}` : "未记忆排班表。";
    }

    function normalizeTemplateText(text) {
      const names = text.split(/\r?\n/).map(norm).filter(Boolean);
      return names.length ? names.join("\n") : DEFAULT_TEMPLATE_TEXT;
    }

    function applyTemplate() {
      els.templateText.value = normalizeTemplateText(els.templateText.value);
      const names = els.templateText.value.split(/\r?\n/).map(norm).filter(Boolean);
      const previousAssignments = new Map();
      for (const slot of state.slots) {
        const title = norm(slot.title);
        if (!previousAssignments.has(title)) previousAssignments.set(title, []);
        previousAssignments.get(title).push([...slot.peopleIds]);
      }
      state.slots = names.map(title => ({
        id: id("s"),
        title,
        peopleIds: previousAssignments.get(title)?.shift() || []
      }));
      localStorage.setItem(keys.templateText, els.templateText.value);
      autoAssign();
      render();
    }

    function autoAssign() {
      for (const slot of state.slots) {
        if (AUTO_ASSIGN_SLOT_TITLES.has(norm(slot.title))) slot.peopleIds = [];
      }
      for (const person of state.people) {
        const title = autoSlotTitle(person);
        if (!title) continue;
        const slot = state.slots.find(item => item.title === title);
        if (slot && !slot.peopleIds.includes(person.id)) slot.peopleIds.push(person.id);
        if (title === "备山") {
          const mountainSlot = state.slots.find(item => item.title === "青龙山");
          if (mountainSlot && !mountainSlot.peopleIds.includes(person.id)) mountainSlot.peopleIds.push(person.id);
        }
      }
    }

    function autoSlotTitle(person) {
      const fixedSlot = AUTO_ASSIGN_NAME_TO_SLOT.get(norm(person.name));
      if (fixedSlot) return fixedSlot;
      const value = norm(person.shift).replace(/\s/g, "");
      if (!value || value.includes("夜休")) return "";
      if (value === "夜" || value.includes("夜班")) return "夜班";
      if (value.includes("备山")) return "备山";
      if (value.includes("二备")) return "二备";
      if (value.includes("备")) return "备班";
      if (value.includes("胃")) return "胃镜室";
      if (value.includes("山")) return "青龙山";
      return "";
    }

    function assignToSlot(slotId, personId = state.selectedPersonId) {
      const slot = state.slots.find(item => item.id === slotId);
      if (!slot || !personId) return;
      slot.peopleIds.push(personId);
      state.selectedPersonId = "";
      render();
    }

    function removeAssignment(slotId, personId, index) {
      const slot = state.slots.find(item => item.id === slotId);
      if (!slot) return;
      let seen = -1;
      const found = slot.peopleIds.findIndex(idValue => {
        if (idValue !== personId) return false;
        seen += 1;
        return seen === index;
      });
      if (found >= 0) slot.peopleIds.splice(found, 1);
      render();
    }

    function removePerson(personId) {
      const person = personById(personId);
      if (!person) return;
      const assignments = state.slots
        .map(slot => ({
          slotId: slot.id,
          indexes: slot.peopleIds.map((idValue, indexValue) => idValue === personId ? indexValue : -1).filter(indexValue => indexValue >= 0)
        }))
        .filter(item => item.indexes.length);
      const key = personKey(person);
      if (!state.hiddenPeopleKeys.includes(key)) {
        state.hiddenPeopleKeys.push(key);
      }
      state.lastRemovedPerson = { person: { ...person }, assignments };
      state.people = state.people.filter(item => item.id !== personId);
      for (const slot of state.slots) {
        slot.peopleIds = slot.peopleIds.filter(idValue => idValue !== personId);
      }
      render();
    }

    function restoreRemovedPerson() {
      const snapshot = state.lastRemovedPerson;
      if (!snapshot) return;
      state.hiddenPeopleKeys = state.hiddenPeopleKeys.filter(key => key !== personKey(snapshot.person));
      if (!state.people.some(item => item.id === snapshot.person.id)) {
        state.people.push({ ...snapshot.person });
      }
      for (const entry of snapshot.assignments) {
        const slot = state.slots.find(item => item.id === entry.slotId);
        if (!slot) continue;
        for (const indexValue of entry.indexes) {
          const insertAt = Math.max(0, Math.min(indexValue, slot.peopleIds.length));
          slot.peopleIds.splice(insertAt, 0, snapshot.person.id);
        }
      }
      state.lastRemovedPerson = null;
      render();
    }

    function renderUndo() {
      if (!state.lastRemovedPerson) {
        els.undoBar.hidden = true;
        els.undoText.textContent = "";
        return;
      }
      els.undoBar.hidden = false;
      els.undoText.textContent = `已移除 ${state.lastRemovedPerson.person.name}`;
    }

    function removeMissingAssignments() {
      const valid = new Set(state.people.map(person => person.id));
      for (const slot of state.slots) slot.peopleIds = slot.peopleIds.filter(personId => valid.has(personId));
    }

    function getCounts(ignoreSpecial = false) {
      const counts = new Map();
      for (const slot of state.slots) {
        if (ignoreSpecial && ["夜班", "备班", "备办", "备山", "二备"].includes(slot.title)) continue;
        for (const personId of slot.peopleIds) counts.set(personId, (counts.get(personId) || 0) + 1);
      }
      return counts;
    }

    function getSelectedCounts() {
      const counts = new Map();
      for (const slot of state.slots) {
        if (IGNORED_SELECTED_SLOT_TITLES.has(norm(slot.title))) continue;
        for (const personId of slot.peopleIds) counts.set(personId, (counts.get(personId) || 0) + 1);
      }
      return counts;
    }

    function personById(personId) {
      return state.people.find(person => person.id === personId);
    }

    function formatPersonOptionLabel(person, counts) {
      const assignedCount = counts.get(person.id) || 0;
      const suffix = assignedCount > 0 ? (assignedCount > 1 ? `（已选${assignedCount}次）` : "（已选）") : "";
      const base = [person.name, person.shift || ""].filter(Boolean).join(" ");
      return `${base}${suffix}`;
    }

    function renderPeople() {
      const counts = getSelectedCounts();
      els.peopleCount.textContent = `${state.people.length}人`;
      if (!state.people.length) {
        els.peopleList.innerHTML = `<div class="hint">请先导入 Excel，或刷新表外人员。</div>`;
        return;
      }
      els.peopleList.innerHTML = "";
      for (const person of state.people) {
        const row = document.createElement("div");
        row.className = "chip-row";
        const chip = document.createElement("div");
        chip.className = `chip ${counts.has(person.id) ? "assigned" : ""}`;
        chip.classList.add("chip-main");
        chip.innerHTML = `<div class="chip-head"><div class="name">${escapeHtml(person.name)}</div>${counts.has(person.id) ? '<span class="assigned-mark">★</span>' : ""}</div><div class="shift">${escapeHtml(person.shift || "未备注")}</div>`;
        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.className = "chip-remove";
        removeButton.title = `删除 ${person.name}`;
        removeButton.setAttribute("aria-label", `删除 ${person.name}`);
        removeButton.textContent = "×";
        removeButton.addEventListener("click", () => removePerson(person.id));
        row.append(chip, removeButton);
        els.peopleList.appendChild(row);
      }
    }

    function renderSlots() {
      const counts = getSelectedCounts();
      els.slots.innerHTML = "";
      for (const slot of state.slots) {
        const slotEl = document.createElement("div");
        slotEl.className = "slot";
        const selectedOptions = state.people.map(person => `<option value="${person.id}">${escapeHtml(formatPersonOptionLabel(person, counts))}</option>`).join("");
        slotEl.innerHTML = `
          <div class="slot-head">
            <div class="slot-title">${escapeHtml(slot.title)}</div>
            <span class="hint">${slot.peopleIds.length}人</span>
          </div>
          <div class="slot-body">
            <div class="assigned-list"></div>
            <div class="slot-actions">
              <select data-select="${slot.id}"><option value="">从人员池选择</option>${selectedOptions}</select>
              <button type="button" data-pick="${slot.id}">选入</button>
            </div>
          </div>
        `;
        const list = slotEl.querySelector(".assigned-list");
        slot.peopleIds.forEach((personId, index) => {
          const person = personById(personId);
          if (!person) return;
          const pill = document.createElement("span");
          pill.className = "assigned-pill";
          pill.innerHTML = `${escapeHtml(person.name)} <button type="button">×</button>`;
          pill.querySelector("button").addEventListener("click", () => removeAssignment(slot.id, personId, index));
          list.appendChild(pill);
        });
        slotEl.querySelector(`[data-pick="${slot.id}"]`).addEventListener("click", () => {
          const select = slotEl.querySelector(`[data-select="${slot.id}"]`);
          assignToSlot(slot.id, select.value);
          select.value = "";
        });
        els.slots.appendChild(slotEl);
      }
    }

    function isMissingExempt(person) {
      const shift = norm(person.shift).replace(/\s/g, "");
      return shift.includes("下夜");
    }

    function renderStatus() {
      const counts = getCounts();
      const duplicateCounts = getCounts(true);
      const missing = state.people.filter(person => !counts.has(person.id) && !isMissingExempt(person));
      const duplicates = state.people.filter(person => (duplicateCounts.get(person.id) || 0) > 1);
      const statuses = [];
      if (!state.people.length) statuses.push({ type: "warn", text: "还没有人员。" });
      else if (!missing.length && !duplicates.length) statuses.push({ type: "good", text: "没有遗漏，也没有普通岗位重复。" });
      if (missing.length) statuses.push({ type: "warn", text: `遗漏 ${missing.length} 人：${missing.map(p => p.name).join("、")}` });
      if (duplicates.length) statuses.push({ type: "bad", text: `重复 ${duplicates.length} 人：${duplicates.map(p => p.name).join("、")}` });
      els.statusList.innerHTML = statuses.map(item => `<div class="status ${item.type}">${escapeHtml(item.text)}</div>`).join("");
    }

    function outputLine(title, names) {
      const text = names.length ? names.join(title.includes("青龙山") || title.includes("胃镜") ? " " : "、") : "未安排";
      if (/^\d+\+\d+$/.test(title) || ["夜班", "备班", "备山", "二备"].includes(title)) return `${title}：${text}`;
      return `${title}: ${text}`;
    }

    function formatName(person, title) {
      return `${/号间|胃镜|青龙山/.test(title) ? "@" : ""}${person.name}`;
    }

    function getCombinedDutyLine() {
      const combinedSlot = state.slots.find(slot => norm(slot.title) === "总值班/二线班");
      const combinedNames = combinedSlot
        ? combinedSlot.peopleIds.map(personById).filter(Boolean).map(person => person.name)
        : [];
      const uniqueCombined = [...new Set(combinedNames)];
      if (uniqueCombined.length) return `总值班、二线班：${uniqueCombined.join("、")}`;
      const total = state.specialDuty["总值班"];
      const second = state.specialDuty["二线班"];
      if (!total && !second) return "";
      return `总值班、二线班：${total && second && total === second ? total : [total, second].filter(Boolean).join("、")}`;
    }

    function generateOutput() {
      const lines = [];
      if (state.selectedDateLabel) lines.push(`${state.selectedDateLabel}排班:`);
      for (const slot of state.slots) {
        if (norm(slot.title) === "总值班/二线班") continue;
        const names = slot.peopleIds.map(personById).filter(Boolean).map(person => formatName(person, slot.title));
        lines.push(outputLine(slot.title, names));
      }
      const combinedDutyLine = getCombinedDutyLine();
      if (combinedDutyLine) lines.push(combinedDutyLine);
      const notes = norm(els.notesText.value);
      if (notes) lines.push("备注:", notes);
      lines.push("总值班随时进行人员协调!");
      els.outputText.value = lines.join("\n");
    }

    function render() {
      renderPeople();
      renderUndo();
      renderSlots();
      renderStatus();
      generateOutput();
      renderStep();
    }

    function renderStep() {
      document.querySelectorAll("[data-step-panel]").forEach(panel => {
        panel.hidden = Number(panel.dataset.stepPanel) !== currentStep;
      });
      document.querySelectorAll("[data-step-tab]").forEach(tab => {
        tab.classList.toggle("active", Number(tab.dataset.stepTab) === currentStep);
      });
      els.prevStep.hidden = currentStep === 0;
      els.nextStep.hidden = currentStep === 2;
      els.nextStep.textContent = "下一步";
      document.querySelector(".secondary-actions").classList.toggle("single", currentStep === 0 || currentStep === 2);
    }

    function goStep(step) {
      currentStep = Math.max(0, Math.min(2, step));
      renderStep();
    }

    function escapeHtml(value) {
      return norm(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }

    function clearSlotAssignments() {
      for (const slot of state.slots) slot.peopleIds = [];
      autoAssign();
      render();
    }

    function parseWorkbook(file) {
      const reader = new FileReader();
      reader.onload = event => {
        try {
          const workbook = XLSX.read(new Uint8Array(event.target.result), { type: "array" });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const matrixRows = matrixFromSheet(sheet);
          if (!setupSchedule(matrixRows)) {
            alert("没有识别到横向日期排班表。");
            return;
          }
          saveSchedule(matrixRows, file.name);
          localStorage.setItem(keys.selectedDateColumn, els.dateSelect.value || "");
        } catch (error) {
          alert(`导入失败：${error.message}`);
        }
      };
      reader.readAsArrayBuffer(file);
    }

    els.fileInput.addEventListener("change", event => {
      const file = event.target.files[0];
      if (file) parseWorkbook(file);
    });

    els.dateSelect.addEventListener("change", () => {
      localStorage.setItem(keys.selectedDateColumn, els.dateSelect.value || "");
      rebuildPeopleFromDate();
    });

    els.outsidePeople.addEventListener("input", () => {
      localStorage.setItem(keys.outsideText, els.outsidePeople.value);
    });

    els.refreshOutside.addEventListener("click", () => {
      state.outsidePeople = parsePeopleText(els.outsidePeople.value).map(person => ({ ...person, source: "outside" }));
      combinePeople();
      removeMissingAssignments();
      autoAssign();
      render();
    });

    els.applyTemplate.addEventListener("click", applyTemplate);
    els.undoRemove.addEventListener("click", restoreRemovedPerson);
    els.clearTemplateAssignments.addEventListener("click", clearSlotAssignments);
    els.templateText.addEventListener("input", () => localStorage.setItem(keys.templateText, els.templateText.value));
    els.notesText.addEventListener("input", () => {
      localStorage.setItem(keys.notesText, els.notesText.value);
      generateOutput();
    });
    els.clearAssignments.addEventListener("click", clearSlotAssignments);
    els.clearAll.addEventListener("click", () => {
      state.people = [];
      state.basePeople = [];
      state.outsidePeople = [];
      state.matrixRows = [];
      state.dateColumns = [];
      state.specialDuty = {};
      state.selectedDateLabel = "";
      state.selectedPersonId = "";
      state.hiddenPeopleKeys = [];
      state.lastRemovedPerson = null;
      els.dateSelect.innerHTML = "";
      localStorage.removeItem(keys.scheduleMatrix);
      localStorage.removeItem(keys.scheduleFileName);
      localStorage.removeItem(keys.selectedDateColumn);
      localStorage.removeItem(keys.scheduleMatrixVersion);
      updateFileStatus();
      render();
    });
    els.copyText.addEventListener("click", async () => {
      generateOutput();
      try {
        await navigator.clipboard.writeText(els.outputText.value);
        els.copyText.textContent = "已复制";
        setTimeout(() => els.copyText.textContent = "复制", 1200);
      } catch {
        els.outputText.select();
        document.execCommand("copy");
      }
    });
    els.prevStep.addEventListener("click", () => goStep(currentStep - 1));
    els.nextStep.addEventListener("click", () => goStep(currentStep === 2 ? 0 : currentStep + 1));
    document.querySelectorAll("[data-step-tab]").forEach(tab => {
      tab.addEventListener("click", () => goStep(Number(tab.dataset.stepTab)));
    });

    const savedTemplate = localStorage.getItem(keys.templateText);
    const savedNotes = localStorage.getItem(keys.notesText);
    const savedOutside = localStorage.getItem(keys.outsideText);
    if (savedTemplate !== null) {
      const normalizedTemplate = normalizeTemplateText(savedTemplate);
      els.templateText.value = LEGACY_TEMPLATE_TEXTS.has(normalizedTemplate) ? DEFAULT_TEMPLATE_TEXT : normalizedTemplate;
    } else {
      els.templateText.value = DEFAULT_TEMPLATE_TEXT;
    }
    if (savedNotes !== null) els.notesText.value = savedNotes;
    if (savedOutside !== null) els.outsidePeople.value = savedOutside;
    state.outsidePeople = parsePeopleText(els.outsidePeople.value).map(person => ({ ...person, source: "outside" }));
    applyTemplate();
    loadSchedule();
    updateFileStatus();
    render();
  </script>
</body>
</html>
